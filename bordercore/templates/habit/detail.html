{% extends "base.html" %}
{% load vite_tags %}

{% block title %}{{ title }}{% endblock %}

{% block crumb_leaf %}habit{% endblock %}

{% block content %}
    <div id="react-root"
        data-habit="{{ habit_json }}"
        data-log-url="{% url 'habit:log' %}"
        data-set-inactive-url="{% url 'habit:set_inactive' %}"
    ></div>
{% endblock %}

{% block javascript_bundles %}
    {{ block.super }}
    {% vite_asset "dist/js/habit-detail" %}
{% endblock %}
