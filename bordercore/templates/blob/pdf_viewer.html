{% extends "base.html" %}

{% block title %}{{ blob.name }} - PDF Viewer{% endblock %}

{% block content %}

    <iframe
        id="pdf-viewer"
        sandbox="allow-scripts allow-same-origin"
        src="{{ STATIC_URL }}pdfjs/web/viewer.html?file={{ file_url }}{% if search_term %}#search={{ search_term|urlencode }}&phrase=true{% endif %}">
    </iframe>

{% endblock %}
