AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Store Favicons in S3

Globals:
    Function:
        Timeout: 360


Resources:

    SnarfFaviconFunction:
        Type: AWS::Serverless::Function
        # Tell SAM to build the image from the local Dockerfile instead of
        # referencing an existing ECR image. With this Metadata block,
        # `sam build` runs `docker build`, `sam package` pushes to the
        # repository passed via --image-repository, and `sam deploy`
        # updates the function with the resulting ImageUri.
        Metadata:
            Dockerfile: Dockerfile
            DockerContext: .
            DockerTag: latest
        Properties:
            PackageType: Image
            FunctionName: SnarfFavicon
            MemorySize: 1024
            Role: !GetAtt SnarfFaviconLambdaRole.Arn
            Environment:
                Variables:
                    BUCKET_NAME: bordercore-blobs

    LambdaFunctionLogGroup:
        Type: "AWS::Logs::LogGroup"
        DependsOn: "SnarfFaviconFunction"
        Properties:
            RetentionInDays: 90
            LogGroupName: !Join ["", ["/aws/lambda/", !Ref SnarfFaviconFunction]]

    SnarfFaviconLambdaRole:
        Type: AWS::IAM::Role
        Properties:
            AssumeRolePolicyDocument:
                Version: 2012-10-17
                Statement:
                    - Effect: "Allow"
                      Principal:
                          Service:
                              - "lambda.amazonaws.com"
                      Action:
                          - "sts:AssumeRole"

            Policies:
            - PolicyName: LambdaWriteToLogs
              PolicyDocument:
                  Statement:
                      - Effect: "Allow"
                        Action:
                            - "logs:CreateLogGroup"
                            - "logs:CreateLogStream"
                            - "logs:PutLogEvents"
                            - "logs:DescribeLogStreams"
                        Resource:
                            - "arn:aws:logs:*:*:*"
            - PolicyName: WriteToS3
              PolicyDocument:
                  Statement:
                      - Effect: "Allow"
                        Action:
                            - s3:PutObject
                            - s3:PutObjectAcl
                        Resource:
                            - "arn:aws:s3:::bordercore-blobs"
                            - "arn:aws:s3:::bordercore-blobs/*"
