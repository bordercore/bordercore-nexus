AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Update RSS feeds

Globals:
    Function:
        Timeout: 60

Parameters:
  DRFTokenParameter:
    Type: String
    Description: The Django Rest Framework token used for authentication

Resources:

    UpdateFeedsFunction:
        Type: AWS::Serverless::Function
        # Tell SAM to build the image from the local Dockerfile instead of
        # referencing an existing ECR image. With this Metadata block,
        # `sam build` runs `docker build`, `sam package` pushes to the
        # repository passed via --image-repository, and `sam deploy`
        # updates the function with the resulting ImageUri.
        Metadata:
            Dockerfile: Dockerfile
            DockerContext: .
            DockerTag: latest
        Properties:
            PackageType: Image
            FunctionName: UpdateFeeds
            MemorySize: 128
            Role: !GetAtt UpdateFeedsLambdaRole.Arn
            Environment:
                Variables:
                    DRF_TOKEN: !Ref DRFTokenParameter

    LambdaFunctionLogGroup:
        Type: "AWS::Logs::LogGroup"
        DependsOn: "UpdateFeedsFunction"
        Properties:
            RetentionInDays: 90
            LogGroupName: !Join ["", ["/aws/lambda/", !Ref UpdateFeedsFunction]]


    UpdateFeedsLambdaRole:
        Type: AWS::IAM::Role
        Properties:
            AssumeRolePolicyDocument:
                Version: 2012-10-17
                Statement:
                    - Effect: 'Allow'
                      Principal:
                          Service:
                              - 'lambda.amazonaws.com'
                      Action:
                          - 'sts:AssumeRole'

            Policies:
            - PolicyName: LambdaWriteToLogs
              PolicyDocument:
                  Statement:
                      - Effect: 'Allow'
                        Action:
                            - 'logs:CreateLogGroup'
                            - 'logs:CreateLogStream'
                            - 'logs:PutLogEvents'
                            - 'logs:DescribeLogStreams'
                        Resource:
                            - 'arn:aws:logs:*:*:*'
            ManagedPolicyArns:
            - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole


Outputs:

    UpdateFeedsFunction:
      Description: "Update RSS Feeds"
      Value: !GetAtt UpdateFeedsFunction.Arn
