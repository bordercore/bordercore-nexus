AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Create thumbnails for collections

Globals:
    Function:
        Timeout: 360

Parameters:
  DRFTokenParameter:
    Type: String
    Description: The Django Rest Framework token used for authentication
  EFSMountPointParameter:
    Type: String
    Description: The EFS mount point on the file system
  EFSAccessPointParameter:
    Type: String
    Description: The EFS access point
  MagickTemporaryPathParameter:
    Type: String
    Description: Set path where ImageMagick stores temporary files

Resources:

    CreateCollectionThumbnailFunction:
        Type: AWS::Serverless::Function
        # Tell SAM to build the image from the local Dockerfile instead of
        # referencing an existing ECR image. With this Metadata block,
        # `sam build` runs `docker build`, `sam package` pushes to the
        # repository passed via --image-repository, and `sam deploy`
        # updates the function with the resulting ImageUri.
        Metadata:
            Dockerfile: Dockerfile
            DockerContext: .
            DockerTag: latest
        Properties:
            PackageType: Image
            FunctionName: CreateCollectionThumbnail
            MemorySize: 10240
            Role: !GetAtt CreateCollectionThumbnailLambdaRole.Arn
            VpcConfig:
              SecurityGroupIds:
                - sg-bfa013fe
              # This subnet should match the private subnet created for the NAT gateway,
              #  which I am labeling "Private Lambda"
              SubnetIds:
                - subnet-09460047abea1c3bd
            Environment:
                Variables:
                    DRF_TOKEN: !Ref DRFTokenParameter
                    EFS_DIR:
                      Ref: EFSMountPointParameter
                    MAGICK_TEMPORARY_PATH:
                      Ref: MagickTemporaryPathParameter
            FileSystemConfigs:
                - Arn: !Sub "arn:aws:elasticfilesystem:us-east-1:${AWS::AccountId}:access-point/${EFSAccessPointParameter}"
                  LocalMountPath:
                      Ref: EFSMountPointParameter

    LambdaFunctionLogGroup:
        Type: "AWS::Logs::LogGroup"
        DependsOn: "CreateCollectionThumbnailFunction"
        Properties:
            RetentionInDays: 90
            LogGroupName: !Join ["", ["/aws/lambda/", !Ref CreateCollectionThumbnailFunction]]


    CreateCollectionThumbnailLambdaRole:
        Type: AWS::IAM::Role
        Properties:
            AssumeRolePolicyDocument:
                Version: 2012-10-17
                Statement:
                    - Effect: "Allow"
                      Principal:
                          Service:
                              - "lambda.amazonaws.com"
                      Action:
                          - "sts:AssumeRole"

            Policies:
            - PolicyName: LambdaWriteToLogs
              PolicyDocument:
                  Statement:
                      - Effect: "Allow"
                        Action:
                            - "logs:CreateLogGroup"
                            - "logs:CreateLogStream"
                            - "logs:PutLogEvents"
                            - "logs:DescribeLogStreams"
                        Resource:
                            - "arn:aws:logs:*:*:*"
            - PolicyName: WriteToS3
              PolicyDocument:
                  Statement:
                      - Effect: "Allow"
                        Action:
                            - s3:PutObject
                        Resource:
                            - "arn:aws:s3:::bordercore-blobs"
                            - "arn:aws:s3:::bordercore-blobs/*"
            ManagedPolicyArns:
            - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole


Outputs:

    CreateCollectionThumbnailFunction:
      Description: "Create thumbnails for collections"
      Value: !GetAtt CreateCollectionThumbnailFunction.Arn
