AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Create Text Embeddings

Globals:
    Function:
        Timeout: 120

Parameters:
    ElasticsearchEndpointParameter:
        Type: String
        Description: The Elasticsearch endpoint
    DRFTokenParameter:
        Type: String
        Description: The Django Rest Framework token used for authentication
    OpenaiApiKeyParameter:
        Type: String
        Description: The OpenAI API Key
    SecurityGroupParameter:
        Type: String
        Description: The VPC security group that lambda is in
    SubnetParameter:
        Type: String
        Description: The VPC subnet

Resources:

    CreateEmbeddingsFunction:
        Type: AWS::Serverless::Function
        # Tell SAM to build the image from the local Dockerfile instead of
        # referencing an existing ECR image. With this Metadata block,
        # `sam build` runs `docker build`, `sam package` pushes to the
        # repository passed via --image-repository, and `sam deploy`
        # updates the function with the resulting ImageUri.
        Metadata:
            Dockerfile: Dockerfile
            DockerContext: .
            DockerTag: latest
        Properties:
            PackageType: Image
            FunctionName: CreateEmbeddings
            MemorySize: 10240
            Role: !GetAtt CreateEmbeddingsLambdaRole.Arn
            VpcConfig:
                SecurityGroupIds:
                    - !Ref SecurityGroupParameter
                # This subnet should match the private subnet created for the NAT gateway,
                #  which I am labeling 'Private Lambda'
                SubnetIds:
                    - !Ref SubnetParameter

            Environment:
                Variables:
                    TRANSFORMERS_CACHE: /tmp
                    XDG_CACHE_HOME: /tmp
                    DRF_TOKEN: !Ref DRFTokenParameter
                    ELASTICSEARCH_ENDPOINT: !Ref ElasticsearchEndpointParameter
                    OPENAI_API_KEY: !Ref OpenaiApiKeyParameter

    LambdaFunctionLogGroup:
        Type: "AWS::Logs::LogGroup"
        DependsOn: "CreateEmbeddingsFunction"
        Properties:
            RetentionInDays: 90
            LogGroupName: !Join ["", ["/aws/lambda/", !Ref CreateEmbeddingsFunction]]

    CreateEmbeddingsLambdaRole:
        Type: AWS::IAM::Role
        Properties:
            AssumeRolePolicyDocument:
                Version: 2012-10-17
                Statement:
                    - Effect: "Allow"
                      Principal:
                          Service:
                              - "lambda.amazonaws.com"
                      Action:
                          - "sts:AssumeRole"

            Policies:
            - PolicyName: LambdaWriteToLogs
              PolicyDocument:
                  Statement:
                      - Effect: "Allow"
                        Action:
                            - "logs:CreateLogGroup"
                            - "logs:CreateLogStream"
                            - "logs:PutLogEvents"
                            - "logs:DescribeLogStreams"
                        Resource:
                            - "arn:aws:logs:*:*:*"
            ManagedPolicyArns:
            - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole


Outputs:

    CreateEmbeddingsFunction:
      Description: "Create Text Embeddings"
      Value: !GetAtt CreateEmbeddingsFunction.Arn
