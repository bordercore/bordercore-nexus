name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bordercore
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    env:
      PYTHONPATH: $PYTHONPATH:.:bordercore
      DJANGO_SETTINGS_MODULE: config.settings.dev
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: uv sync --group dev

    - name: Run mypy
      run: |
        uv run mypy --config-file pyproject.toml bordercore/

    - name: Run tests
      env:
        SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        DJANGO_LOG_DIR: ${{ runner.temp }}
        DATABASE_HOST: localhost
        DATABASE_USER: postgres
        DATABASE_PASSWORD: postgres
      run: |
        uv run pytest -m "not data_quality and not functional" ./bordercore/ -v -n auto

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bordercore
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: bordercore/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Typecheck
      run: npm run typecheck

    - name: Lint (ESLint)
      run: npm run lint:react

    - name: Format check (Prettier)
      run: npm run format:check:react

    - name: Lint SCSS (stylelint)
      run: npx stylelint "static/scss/**/*.{scss,css}"

    - name: Build
      run: npm run vite:build
